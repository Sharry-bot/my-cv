<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200px, initial-scale=1.0">
  <title>图片标签</title>
</head>

<body>
  <h1>图片标签</h1>
  <img src="1.png" alt="戴珍珠耳环的少女建模练习">
  <img src="11.jpg" alt="戴珍珠耳环的少女建模练习">
  <!-- 看一下图片无法加载时的效果 -->
  <img src="1.png" alt="戴珍珠耳环的少女建模练习" width="500px" title="我的第一次建模练习">
  <!-- 属性之间必须有空格分离 -->
  <!-- 设置一下不同格式的图片 -->
  <img src="01.jpg" alt="">
  <img src="02.png" alt="">
  <img src="03.gif" alt="">
  <img src="04.avif" alt="">
  <img src="05.webp" alt="">
  <!-- 尝试在相对路 径插入图片 -->
  <img src="./1.png" alt="">
  <img src="img/02.png" alt="">


</body>

</html>
