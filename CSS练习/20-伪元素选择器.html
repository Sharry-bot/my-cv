<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 选择首行 */
    p::first-line {
      color: red;
    }

    /* 选择首字母 */
    p::first-letter {
      color: green;
      font-size: 30px;
    }

    /* 选择占位符 */
    textarea::placeholder {
      color: red;
      font-size: 12px;
    }

    /* before和after伪元素 */
    .box::before {
      content: '我是';
      color: red;
    }

    .box::after {
      content: '老师';
      color: red;
    }
  </style>
</head>

<body>
  <p>
    伪元素选择器：
    1、伪元素选择器是通过元素的特殊状态来选择元素的。
    2、伪元素选择器可以用于选择元素的开始或结束部分。
    3、伪元素选择器可以用于选择元素的文本内容或背景内容。
  </p>
  <textarea name="" id="" placeholder="请您留言"></textarea>
  <div class="box">pink</div>

</html>
