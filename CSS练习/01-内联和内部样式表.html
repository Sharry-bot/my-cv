<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      color: red;
    }

    strong {
      color: blue;
    }
  </style>
</head>

<body>
  <!-- 1.内联样式表（行内样式表） 直接写到标签内部，控制当前标签。 -->
  <p style="color: green;">我喜欢绿色</p>

  <!-- 2.内部样式表，写到head标签中，控制当前页面 -->
  <div>这个人喜欢红色</div>
  <strong>这个标签是加粗的</strong>
</body>

</html>
