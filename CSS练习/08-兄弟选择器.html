<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 邻接兄弟选择器 */
    h2+p {
      color: red;
    }

    /* 通用兄弟选择器 */
    h3~p {
      color: blue;
    }

    .active+li {
      color: red;
    }

    .fourth~li {
      color: blue;
    }
  </style>
</head>

<body>
  <p>这是一个段落</p>
  <p>这是第二个段落</p>
  <h2>这是一个标题</h2>
  <p>这是第三个段落</p>
  <p>这是第四个段落</p>
  <h3>这是一个标题</h3>
  <p>这是第五个段落</p>
  <p>这是第六个段落</p>
  <ul>
    <li>榜一</li>
    <li class="active">榜二</li>
    <li>榜三</li>
    <li class="fourth">榜四</li>
    <li>榜五</li>
    <li>榜六</li>
  </ul>
</body>

</html>
