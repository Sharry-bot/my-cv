<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- 3.类型选择器，根据标签名选择元素 -->
  <style>
    div {
      /* 注释 */
      color: red;
      font-size: 20px;
    }

    li {
      /* 设置文本颜色为蓝色 */
      color: blue;
      /* 设置字体大小为16px */
      font-size: 16px;
      /* 设置字体为粗体 */
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div>项目集</div>
  <div>学校背景</div>
  <div>项目介绍</div>
  <div>项目展示</div>
  <ul>
    <li>项目1</li>
    <li>项目2</li>
    <li>项目3</li>
    <li>项目4</li>
    <li>项目5</li>
    <li>项目6</li>
    <li>项目7</li>
    <li>项目8</li>
    <li>项目9</li>
    <li>项目10</li>
    <li>项目11</li>
    <li>项目12</li>
    <li>项目13</li>
  </ul>
</body>

</html>
