<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* * {
      color: red !important;
    } */

    div {
      color: blue;
    }

    .box {
      color: green;
    }

    #header {
      color: pink;
    }

    .nav ul li a {
      color: red;
      text-decoration: none;
    }

    span {
      color: blue;
    }

    p {
      color: red;
    }

    /* 继承的权重是0 */
    header {
      font-weight: 400;
    }

    /* 需要专门的自己的样式覆盖继承的样式 */
    h1 {
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="box" id="header" style="color: yellow">CSS权重优先级</div>
  <div class="nav">
    <ul>
      <li><a href="#">首页</a></li>
    </ul>
  </div>
  <!-- 继承的权重是0 -->
  <p><span>文字</span></p>
  <!-- 比如h和链接 浏览器有自己默认的样式 -->
  <header>
    <h1>一级标题</h1>
  </header>

  <a href="#">链接</a>
</body>

</html>
