<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- 5.id选择器，根据id选择元素 -->
  <style>
    #project {
      color: red;
      font-size: 20px;
    }
  </style>
  <!-- 6.通配符选择器，选择所有元素 用*来表示 -->
  <style>
    * {
      color: blue;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="project">
    项目集
  </div>
  <div>
    学校背景
  </div>
</body>

</html>
