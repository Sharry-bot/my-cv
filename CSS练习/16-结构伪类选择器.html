<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 选择第一个小li */
    .ul1 li:first-child {
      color: red;
    }

    /* 选择最后一个小li */
    .ul1 li:last-child {
      color: blue;
    }

    /* 选择第n个lili */
    .ul1 li:nth-child(3) {
      color: green;
    }

    .ul1 li:nth-child(8) {
      color: pink;
    }

    /* 选择奇数个元素 */
    /* .ul2 li:nth-child(odd) {
      color: red;
    } */

    /* 选择偶数个元素 */
    /* .ul2 li:nth-child(even) {
      color: blue;
    } */

    /* 选择3得倍数个元素 */
    /* .ul2 li:nth-child(3n) {
      color: green;
    } */

    /* 选择5得倍数个元素 */
    /* .ul2 li:nth-child(5n) {
      color: pink;
    } */

    /* 选择第3个以后的元素 */
    /* .ul2 li:nth-child(n+3) {
      color: red;
    } */
    /* 选择第2个之前的元素 */
    .ul2 li:nth-child(-n+2) {
      color: pink;
    }
  </style>
</head>

<body>
  <ul class="ul1">
    <li>1</li>
    <li>2</li>
    <li>3</li>
    <li>4</li>
    <li>5</li>
    <li>6</li>
    <li>7</li>
    <li>8</li>
    <li>9</li>
    <li>10</li>
  </ul>
  <ul class="ul2">
    <li>11</li>
    <li>12</li>
    <li>13</li>
    <li>14</li>
    <li>15</li>
    <li>16</li>
    <li>17</li>
    <li>18</li>
    <li>19</li>
    <li>20</li>
  </ul>

</body>

</html>
