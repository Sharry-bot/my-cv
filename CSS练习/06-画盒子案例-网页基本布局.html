<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- 6.画盒子案例-网页基本布局 -->
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .header {
      height: 80px;
      background-color: black;
    }

    .nav {
      height: 50px;
      width: 1000px;
      background-color: #5d5454;
    }

    .main {
      height: 1000px;
      width: 1000px;
      background-color: #9e9595;
    }

    .footer {
      height: 150px;
      background-color: black;
    }

    .center {
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <!-- 头部 -->
  <div class="header"></div>
  <!-- 导航栏 -->
  <div class="nav center"></div>
  <!-- 主体 -->
  <div class="main center"></div>
  <!-- 页脚 -->
  <div class="footer"></div>
</body>

</html>
